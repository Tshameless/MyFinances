name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install project and dev tools
        run: python -m pip install --upgrade pip setuptools && python -m pip install -e ".[dev]"

      - name: Ruff lint
        run: python -m ruff check .

      - name: Mypy type check
        run: python -m mypy python_quant

      - name: Unit tests
        run: python -m unittest discover -s tests -v

  smoke:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: quality

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: python -m pip install --upgrade pip setuptools && python -m pip install -e .

      - name: Demo smoke test
        run: python scripts/dev_check.py --skip-static
